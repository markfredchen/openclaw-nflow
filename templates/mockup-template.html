<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录页 - [项目名称]</title>
    <style>
        /* ========================================
           Design System Variables
           来自 design-pattern.json
           ======================================== */
        :root {
            /* Colors */
            --color-primary: #1890FF;
            --color-primary-hover: #40A9FF;
            --color-primary-active: #096DD9;
            --color-secondary: #52C41A;
            --color-warning: #FAAD14;
            --color-error: #FF4D4F;
            --color-info: #1890FF;
            
            /* Neutral Colors */
            --color-text-primary: #262626;
            --color-text-secondary: #8C8C8C;
            --color-text-disabled: #D9D9D9;
            --color-bg-primary: #FFFFFF;
            --color-bg-secondary: #F5F5F5;
            --color-border: #E8E8E8;
            --color-divider: #EBEEF5;
            
            /* Typography */
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-size-page-title: 24px;
            --font-size-section-title: 18px;
            --font-size-body: 14px;
            --font-size-caption: 12px;
            --font-size-button: 14px;
            
            /* Spacing */
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 12px;
            --spacing-lg: 16px;
            --spacing-xl: 24px;
            --spacing-xxl: 32px;
            
            /* Border Radius */
            --radius-xs: 4px;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-full: 9999px;
            
            /* Shadows */
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 2px 8px rgba(0,0,0,0.1);
            --shadow-lg: 0 4px 12px rgba(0,0,0,0.15);
            --shadow-xl: 0 8px 24px rgba(0,0,0,0.2);
            
            /* Transitions */
            --transition-fast: 150ms;
            --transition-normal: 300ms;
        }

        /* ========================================
           Base Styles
           ======================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            font-size: var(--font-size-body);
            color: var(--color-text-primary);
            background-color: var(--color-bg-secondary);
            line-height: 1.5;
        }

        /* ========================================
           Page Container
           ======================================== */
        .page-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ========================================
           Header / Navigation
           ======================================== */
        .header {
            height: 56px;
            background: var(--color-bg-primary);
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            padding: 0 var(--spacing-lg);
        }

        .header-back {
            font-size: 16px;
            color: var(--color-text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: var(--spacing-sm);
        }

        .header-title {
            flex: 1;
            text-align: center;
            font-size: var(--font-size-section-title);
            font-weight: 600;
        }

        .header-action {
            color: var(--color-primary);
            font-size: var(--font-size-body);
        }

        /* ========================================
           Main Content
           ======================================== */
        .main-content {
            flex: 1;
            padding: var(--spacing-xl);
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
        }

        /* ========================================
           Form Styles
           ======================================== */
        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        .form-label {
            display: block;
            font-size: var(--font-size-body);
            color: var(--color-text-primary);
            margin-bottom: var(--spacing-sm);
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            height: 40px;
            padding: var(--spacing-md) var(--spacing-lg);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            font-size: var(--font-size-body);
            transition: border-color var(--transition-fast);
            background: var(--color-bg-primary);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.1);
        }

        .form-input.error {
            border-color: var(--color-error);
        }

        .form-error {
            font-size: var(--font-size-caption);
            color: var(--color-error);
            margin-top: var(--spacing-xs);
        }

        /* ========================================
           Button Styles
           ======================================== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 40px;
            padding: 0 var(--spacing-xl);
            border-radius: var(--radius-sm);
            font-size: var(--font-size-button);
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            border: none;
        }

        .btn-primary {
            background-color: var(--color-primary);
            color: #FFFFFF;
        }

        .btn-primary:hover {
            background-color: var(--color-primary-hover);
        }

        .btn-primary:active {
            background-color: var(--color-primary-active);
        }

        .btn-primary:disabled {
            background-color: var(--color-text-disabled);
            cursor: not-allowed;
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--color-primary);
            border: 1px solid var(--color-primary);
        }

        .btn-secondary:hover {
            background-color: rgba(24, 144, 255, 0.05);
        }

        .btn-text {
            background: transparent;
            color: var(--color-primary);
            padding: 0;
            height: auto;
        }

        .btn-full-width {
            width: 100%;
        }

        /* ========================================
           Link Styles
           ======================================== */
        .link {
            color: var(--color-primary);
            text-decoration: none;
            font-size: var(--font-size-body);
        }

        .link:hover {
            text-decoration: underline;
        }

        /* ========================================
           Card Styles
           ======================================== */
        .card {
            background: var(--color-bg-primary);
            border-radius: var(--radius-md);
            padding: var(--spacing-lg);
            box-shadow: var(--shadow-md);
        }

        /* ========================================
           Modal Styles
           ======================================== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.45);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--color-bg-primary);
            border-radius: var(--radius-md);
            padding: var(--spacing-xl);
            max-width: 320px;
            width: 90%;
            box-shadow: var(--shadow-xl);
        }

        .modal-title {
            font-size: var(--font-size-section-title);
            font-weight: 600;
            margin-bottom: var(--spacing-md);
            text-align: center;
        }

        .modal-message {
            font-size: var(--font-size-body);
            color: var(--color-text-secondary);
            text-align: center;
            margin-bottom: var(--spacing-xl);
        }

        .modal-actions {
            display: flex;
            gap: var(--spacing-md);
        }

        .modal-actions .btn {
            flex: 1;
        }

        /* ========================================
           Toast / Notification Styles
           ======================================== */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--color-text-primary);
            color: #FFFFFF;
            padding: var(--spacing-md) var(--spacing-xl);
            border-radius: var(--radius-sm);
            font-size: var(--font-size-body);
            box-shadow: var(--shadow-lg);
            opacity: 0;
            transition: opacity var(--transition-normal);
            z-index: 2000;
        }

        .toast.show {
            opacity: 1;
        }

        .toast.success {
            background: var(--color-secondary);
        }

        .toast.error {
            background: var(--color-error);
        }

        /* ========================================
           Loading Spinner
           ======================================== */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1500;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--color-border);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========================================
           Utility Classes
           ======================================== */
        .text-center {
            text-align: center;
        }

        .mt-lg {
            margin-top: var(--spacing-lg);
        }

        .mt-xl {
            margin-top: var(--spacing-xl);
        }

        .mb-lg {
            margin-bottom: var(--spacing-lg);
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* ========================================
           Responsive Styles
           ======================================== */
        @media (min-width: 768px) {
            .main-content {
                padding: var(--spacing-xxl);
            }
        }
    </style>
</head>
<body>
    <div class="page-container">
        <!-- Header -->
        <header class="header">
            <a href="#" class="header-back">← 返回</a>
            <span class="header-title">登录</span>
            <a href="#" class="header-action">注册</a>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <form id="loginForm" class="card">
                <div class="form-group">
                    <label class="form-label" for="phone">手机号</label>
                    <input 
                        type="tel" 
                        id="phone" 
                        class="form-input" 
                        placeholder="请输入手机号"
                        maxlength="11"
                    >
                    <div class="form-error" id="phoneError" style="display: none;"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">密码</label>
                    <input 
                        type="password" 
                        id="password" 
                        class="form-input" 
                        placeholder="请输入密码"
                    >
                    <div class="form-error" id="passwordError" style="display: none;"></div>
                </div>

                <div class="flex-between mb-lg">
                    <a href="#" class="link">忘记密码？</a>
                </div>

                <button type="submit" class="btn btn-primary btn-full-width" id="loginBtn">
                    登录
                </button>
            </form>
        </main>
    </div>

    <!-- Confirm Modal -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal">
            <div class="modal-title">确认登录</div>
            <div class="modal-message">确定要使用当前账号登录吗？</div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="confirmLogin()">确定</button>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal-overlay" id="successModal">
        <div class="modal">
            <div class="modal-title">✓ 登录成功</div>
            <div class="modal-message">即将跳转到首页...</div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <script>
        // ========================================
        // Form Validation
        // ========================================
        function validatePhone(phone) {
            return /^1[3-9]\d{9}$/.test(phone);
        }

        function validatePassword(password) {
            return password.length >= 6;
        }

        // ========================================
        // Modal Controls
        // ========================================
        function showModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }

        function closeModal(modalId) {
            if (modalId) {
                document.getElementById(modalId).classList.remove('active');
            } else {
                // Close all modals
                document.querySelectorAll('.modal-overlay').forEach(modal => {
                    modal.classList.remove('active');
                });
            }
        }

        // ========================================
        // Toast Notification
        // ========================================
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show';
            if (type !== 'info') {
                toast.classList.add(type);
            }
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ========================================
        // Loading State
        // ========================================
        function showLoading() {
            document.getElementById('loadingOverlay').classList.add('active');
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').classList.remove('active');
        }

        // ========================================
        // Form Submit Handler
        // ========================================
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            
            // Reset errors
            document.querySelectorAll('.form-error').forEach(el => {
                el.style.display = 'none';
                el.textContent = '';
            });
            document.querySelectorAll('.form-input').forEach(el => {
                el.classList.remove('error');
            });

            // Validate
            let hasError = false;

            if (!validatePhone(phone)) {
                document.getElementById('phoneError').textContent = '请输入正确的手机号';
                document.getElementById('phoneError').style.display = 'block';
                document.getElementById('phone').classList.add('error');
                hasError = true;
            }

            if (!validatePassword(password)) {
                document.getElementById('passwordError').textContent = '密码至少6位';
                document.getElementById('passwordError').style.display = 'block';
                document.getElementById('password').classList.add('error');
                hasError = true;
            }

            if (hasError) {
                return;
            }

            // Show confirm modal
            showModal('confirmModal');
        });

        // ========================================
        // Confirm Login
        // ========================================
        function confirmLogin() {
            closeModal();
            
            // Simulate API call
            showLoading();
            
            setTimeout(() => {
                hideLoading();
                showModal('successModal');
                
                // Simulate redirect after success
                setTimeout(() => {
                    closeModal();
                    showToast('登录成功，正在跳转...', 'success');
                    // In real app: window.location.href = '/home';
                }, 1500);
            }, 1500);
        }

        // ========================================
        // Input Event Listeners
        // ========================================
        document.getElementById('phone').addEventListener('input', function() {
            this.classList.remove('error');
            document.getElementById('phoneError').style.display = 'none';
        });

        document.getElementById('password').addEventListener('input', function() {
            this.classList.remove('error');
            document.getElementById('passwordError').style.display = 'none';
        });

        // Close modal on overlay click
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', function(e) {
                if (e.target === this) {
                    closeModal();
                }
            });
        });
    </script>
</body>
</html>
